name: medicine_app
description: "Приложение для учёта лекарств в домашней аптечке"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # База данных
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.8.3

  # Дата и время
  intl: ^0.20.2

  # Уведомления
  flutter_local_notifications: ^17.2.2

  # Часовые пояса
  timezone: ^0.9.2

  # Камера и фото
  image_picker: ^1.0.5
  cached_network_image: ^3.3.0

  # Сканер штрих-кодов
  mobile_scanner: ^3.5.0

  # PDF и файлы
  pdf: ^3.10.7
  path_provider: ^2.1.1
  share_plus: ^7.2.1

  # Разрешения
  permission_handler: ^11.1.0

  # HTTP запросы
  http: ^1.1.0

  # Состояние приложения
  provider: ^6.1.1
  shared_preferences: ^2.2.2

  # Графики
  fl_chart: ^0.65.0

  # Анимации
  animate_do: ^3.1.2

  # Cuppertino виджеты
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true